services:
  grok2api:
    container_name: grok2api
    build:
      context: .
    image: grok2api:local
    ports:
      - "${HOST_PORT:-34567}:${SERVER_PORT:-8000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_ENABLED: ${LOG_FILE_ENABLED:-true}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      SERVER_STORAGE_TYPE: ${SERVER_STORAGE_TYPE:-local}
      SERVER_STORAGE_URL: ${SERVER_STORAGE_URL:-}
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      GROK2API_HOST_PROXY: ${GROK2API_HOST_PROXY:-}
      GROK2API_HOST_ASSET_PROXY: ${GROK2API_HOST_ASSET_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      all_proxy: ${all_proxy:-}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://flaresolverr:8191}
      CF_REFRESH_INTERVAL: ${CF_REFRESH_INTERVAL:-600}
      CF_TIMEOUT: ${CF_TIMEOUT:-60}

      # SERVER_STORAGE_TYPE: (local, redis, mysql, pgsql) default: local
      # SERVER_STORAGE_URL: (local mode is empty) default: empty
      #   Redis: redis://localhost:6379/0 or redis://:password@localhost:6379/0
      #   MySQL: mysql+aiomysql://user:pass@localhost/db
      #   PgSQL: postgresql+asyncpg://user:pass@localhost/db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - flaresolverr
    restart: unless-stopped

  # 如果出口 IP 不干净，可取消以下注释使用 Warp 作为落地代理
  # 启用后将 proxy.base_proxy_url 设为 socks5://warp:1080
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
    restart: unless-stopped
